<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Marrakech RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* LOADING SCREEN */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.loader {
  border: 4px solid #222;
  border-top: 4px solid #00aaff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* BACKGROUND CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* MAIN */
.container {
  position: relative;
  z-index: 2;
  margin-top: 90px;
}

h1 {
  font-size: 45px;
  color: #00aaff;
  text-shadow: 0 0 15px #00aaff;
}

p {
  color: #aaa;
}

/* BUTTONS */
.btn {
  display: block;
  width: 280px;
  margin: 12px auto;
  padding: 15px;
  text-decoration: none;
  color: white;
  border: 1px solid #00aaff;
  border-radius: 10px;
  background: rgba(0,170,255,0.05);
  transition: 0.3s;
}

.btn:hover {
  background: #00aaff;
  color: black;
  transform: scale(1.05);
  box-shadow: 0 0 20px #00aaff;
}

/* ENTER SERVER BUTTON */
.enter {
  background: rgba(0,255,100,0.1);
  border: 1px solid #00ff99;
}

.enter:hover {
  background: #00ff99;
  box-shadow: 0 0 25px #00ff99;
}

/* SOUND BUTTON */
.sound-btn {
  position: fixed;
  bottom: 80px;
  right: 15px;
  background: #00aaff;
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 3;
}

/* bottom text */
.bottom {
  position: fixed;
  bottom: 60px;
  width: 100%;
  color: #00aaff;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p style="margin-top:15px;">Loading Marrakech RP...</p>
</div>

<!-- PARTICLES CANVAS -->
<canvas id="canvas"></canvas>

<div class="container">

  <h1>Welcome To Marrakech</h1>
  <p>Official RP Server</p>

  <!-- ENTER SERVER -->
  <a class="btn enter" href="samp://YOUR-SERVER-IP:7777">
    🚀 Enter Server
  </a>

  <!-- WhatsApp -->
  <a class="btn" href="https://wa.me/212775002021?text=%D9%85%D8%B1%D8%AD%D8%A8%D8%A7%20%D8%B5%D8%AF%D9%8A%D9%82%D9%8A%20%22Mostafa%22%20%D9%84%D9%82%D8%AF%20%D8%AC%D8%A6%D8%AA%20%D9%85%D9%86%20%D9%85%D9%88%D9%82%D8%B9%D9%83%D9%85" target="_blank">
    Chat MOSTAFA
  </a>

  <a class="btn" href="https://wa.me/212645987253?text=%D9%85%D8%B1%D8%AD%D8%A8%D8%A7%20%D8%B5%D8%AF%D9%8A%D9%82%D9%8A%20%22Spiders%22%20%D9%84%D9%82%D8%AF%20%D8%AC%D8%A6%D8%AA%20%D9%85%D9%86%20%D9%85%D9%88%D9%82%D8%B9%D9%83%D9%85" target="_blank">
    Chat SPIDERS
  </a>

</div>

<div class="bottom">
  للتواصل معنا اضغط على الأزرار ☝️
</div>

<!-- SOUND BUTTON -->
<button class="sound-btn" onclick="playSound()">🔊 Play Sound</button>

<!-- SOUND -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/gta-san-andreas-theme.mp3" type="audio/mpeg">
</audio>

<script>

/* LOADING SCREEN */
window.onload = function() {
  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
  }, 2000);
};

/* SOUND */
function playSound() {
  document.getElementById("sound").play();
}

/* PARTICLES */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00aaff";

  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
    ctx.fill();
    p.y += p.d;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  }
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
