<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marrakech RP</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  overflow:hidden;
  background:black;
}

/* Loading Screen */
#loading{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  flex-direction:column;
}

.loader{
  border:4px solid #333;
  border-top:4px solid #00c2ff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* Background video */
video{
  position:fixed;
  right:0;
  bottom:0;
  min-width:100%;
  min-height:100%;
  object-fit:cover;
  opacity:0.25;
  z-index:-1;
}

.header{
  text-align:center;
  padding-top:30px;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

#changingText{
  margin-top:10px;
  font-size:18px;
  color:#00c2ff;
}

.container{
  padding:20px;
  text-align:center;
}

.card{
  background:rgba(0,0,0,0.5);
  margin:10px auto;
  padding:15px;
  border-radius:10px;
  width:90%;
  max-width:350px;
}

a{
  color:#00c2ff;
  text-decoration:none;
}

button{
  background:#00c2ff;
  border:none;
  padding:10px;
  border-radius:8px;
  color:black;
  font-weight:bold;
  margin-top:10px;
  width:100%;
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader"></div>
  <p>Loading Marrakech RP...</p>
</div>

<!-- Background Video -->
<video autoplay muted loop>
  <source src="marrakech.mp4" type="video/mp4">
</video>

<!-- Sound -->
<audio autoplay loop>
  <source src="sound.mp3" type="audio/mp3">
</audio>

<div class="header">Marrakech RP</div>
<div id="changingText">Welcome To Marrakech</div>

<div class="container">

  <div class="card">
    <h3>Group WhatsApp</h3>
    <a href="https://chat.whatsapp.com/Gv8hm9WDcRVGA9GoMVDya3?mode=gi_t" target="_blank">
      Join Server Group
    </a>
  </div>

  <div class="card">
    <h3>DEV_MOSTAFA</h3>
    <p>775-002021</p>
    <a href="https://wa.me/775002021?text=مرحبا%20صديقي%20MOSTAFA%20لقد%20جئت%20من%20موقعكم" target="_blank">
      Message on WhatsApp
    </a>
  </div>

  <div class="card">
    <h3>SPIDERS_X17</h3>
    <p>645-987253</p>
    <a href="https://wa.me/645987253?text=مرحبا%20صديقي%20Spiders%20لقد%20جئت%20من%20موقعكم" target="_blank">
      Message on WhatsApp
    </a>
  </div>

</div>

<script>
// Loading screen
window.onload = function(){
  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
  },2000);
}

// Changing text
const texts = ["Welcome To Marrakech","Marrakech RP","Join Our Server"];
let i = 0;
setInterval(()=>{
  i = (i+1)%texts.length;
  document.getElementById("changingText").innerText = texts[i];
},3000);
</script>

</body>
</html>
