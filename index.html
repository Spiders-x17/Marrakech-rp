<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marrakech RP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
            height: 100vh;
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
        }

        /* Loading Screen */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Animated Title */
        .title {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #ccc, #fff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 2s ease-in-out infinite alternate, titleChange 4s infinite;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 10px #fff); }
            100% { filter: drop-shadow(0 0 20px #ccc); }
        }

        @keyframes titleChange {
            0%, 50% { content: "Marrakech RP"; }
            50.1%, 100% { content: "Welcome To Marrakech"; }
        }

        /* Server Link */
        .server-link {
            margin: 30px 0;
            font-size: 1.5rem;
        }

        .server-link a {
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            border: 2px solid #fff;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .server-link a:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        /* Phone Numbers */
        .phones {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 40px;
        }

        .phone-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid #fff;
            color: #fff;
            padding: 20px 30px;
            font-size: 1.2rem;
            border-radius: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .phone-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.3);
        }

        .phone-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Download Section */
        .download-section {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .download-btn {
            display: block;
            background: linear-gradient(45deg, #fff, #ccc);
            color: #000;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Background Video -->
    <video id="bg-video" autoplay muted loop>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-portrait-of-a-woman-in-a-sunset-39875-large.mp4" type="video/mp4">
        <!-- بديل فيديو جامع الفنا -->
        فيديو غير مدعوم
    </video>

    <!-- Main Content -->
    <div class="container">
        <h1 class="title" id="animatedTitle">Marrakech RP</h1>
        
        <div class="server-link">
            <a href="https://chat.whatsapp.com/Gv8hm9WDcRVGA9GoMVDya3?mode=gi_t" target="_blank">
                انضم لمجموعة السيرفر
            </a>
        </div>

        <div class="phones">
            <a href="https://wa.me/212775002021?text=مرحبا%20صديقي%20MOSTAFA%20لقد%20جئت%20من%20موقعكم" 
               class="phone-btn" target="_blank">
                775-002021
                <div class="phone-label">DEV_MOSTAFA</div>
            </a>
            
            <a href="https://wa.me/212645987253?text=مرحبا%20صديقي%20Spiders%20لقد%20جئت%20من%20موقعكم" 
               class="phone-btn" target="_blank">
                645-987253
                <div class="phone-label">SPIDERS_X17</div>
            </a>
        </div>
    </div>

    <!-- Download Section -->
    <div class="download-section">
        <h3>📱 تحميل SAMB</h3>
        <a href="#" class="download-btn">تحميل الآن</a>
        <small>أقوى سيرفر مع أرقامنا الخاصة</small>
    </div>

    <script>
        // Loading Screen
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);
        });

        // Title Animation
        const titles = ['Marrakech RP', 'Welcome To Marrakech'];
        let currentTitle = 0;
        const titleElement = document.getElementById('animatedTitle');

        setInterval(() => {
            currentTitle = (currentTitle + 1) % titles.length;
            titleElement.textContent = titles[currentTitle];
        }, 4000);

        // Video Controls
        const video = document.getElementById('bg-video');
        video.play().catch(e => console.log('Video autoplay prevented'));

        // Mute video by default
        video.muted = true;
    </script>
</body>
</html>
