<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marrakech RP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* فيديو الخلفية - جامع الفنا */
        #bgVideo {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* طبقة غامقة فوق الفيديو */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: -1;
        }

        /* نجوم طايحة من السماء */
        .star {
            position: fixed;
            top: -10px;
            background: #fff;
            border-radius: 50%;
            animation: fall linear infinite;
            z-index: 0;
        }

        @keyframes fall {
            to { transform: translateY(105vh) translateX(50px); opacity: 0; }
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 50px; height: 50px;
            border: 3px solid #222;
            border-top: 3px solid #c1121f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p { margin-top: 20px; color: #c1121f; font-size: 18px; }

        /* Main Container */
        .container {
            display: none;
            background: rgba(15, 15, 15, 0.8);
            padding: 35px 25px;
            border-radius: 8px;
            border: 1px solid #c1121f;
            text-align: center;
            width: 90%;
            max-width: 380px;
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        /* Animated Title */
        #title {
            font-size: 30px;
            font-weight: bold;
            color: #c1121f;
            margin-bottom: 25px;
            height: 38px;
            text-shadow: 0 0 15px rgba(193, 18, 31, 0.8);
            transition: opacity 0.3s;
        }
