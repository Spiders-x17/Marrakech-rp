            min-height: 100vh;

        .container {

            border: 1px solid #555;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        
        .btn:active {
            background: #c1121f;
            transform: scale(0.98);
        }

        .btn-download {
            background: #c1121f;
            border: 1px solid #ff1a1a;
        }

        .btn-group { margin: 18px 0; }

        .btn-label {
            font-size: 13px;
            color: #c1121f;
            margin-bottom: 5px;
            text-align: right;
            font-weight: bold;
        }

        .server-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
            font-size: 12px;
