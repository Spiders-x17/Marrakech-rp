<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Marrakech RP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* خلفية مراكش + جامع الفنا */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1539650116574-75c0c6d73f6e?w=1920&q=80') center/cover;
            z-index: -2;
            animation: cityMove 30s linear infinite alternate;
        }

        @keyframes cityMove {
            0% { transform: scale(1) translateX(0); }
            100% { transform: scale(1.1) translateX(-20px); }
        }

        /* نجوم طايحة من السماء */
        .star {
            position: fixed;
            top: -10px;
            background: #fff;
            border-radius: 50%;
            animation: fall linear infinite;
            z-index: -1;
        }

        @keyframes fall {
            to { transform: translateY(105vh) translateX(50px); opacity: 0; }
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loader {
            width: 50px; height: 50px;
            border: 3px solid #222;
            border-top: 3px solid #c1121f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p { margin-top: 20px; color: #c1121f; font-size: 18px; }

        /* Main Container */
        .container {
            display: none;
            background: rgba(20, 20, 20, 0.85);
            padding: 35px 25px;
            border-radius: 8px;
            border: 1px solid #c1121f;
            text-align: center;
            width: 90%;
            max-width: 380px;
            backdrop-filter: blur(8px);
        }

        /* Animated Title */
        #title {
            font-size: 30px;
            font-weight: bold;
            color: #c1121f;
            margin-bottom: 25px;
            height: 38px;
            text-shadow: 0 0 10px rgba(193, 18, 31, 0.5);
            transition: opacity 0.3s;
        }

        /* Buttons - أقل ألوان */
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            margin: 10px 0;
            background: rgba(40, 40, 40, 0.9);
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        
        .btn:hover {
            background: #c1121f;
            border-color: #c1121f;
        }

        .btn-group {
            margin: 15px 0;
        }

        .btn-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 4px;
        }
    </style>
</head>
