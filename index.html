<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marrakech RP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loader {
            width: 50px; height: 50px;
            border: 3px solid #333;
            border-top: 3px solid #e63946;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p { margin-top: 20px; color: #e63946; font-size: 18px; }

        /* Main Container */
        .container {
            display: none;
            background: #2a2a2a;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Animated Title */
        #title {
            font-size: 32px;
            font-weight: bold;
            color: #e63946;
            margin-bottom: 30px;
            height: 40px;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: #333;
            color: #fff;
            border: 1px solid #e63946;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #e63946;
            transform: translateY(-2px);
        }

        .btn-group {
            margin: 20px 0;
        }

        .btn-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        /* Login Form */
        #loginForm {
            display: none;
            margin-top: 20px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
        }
        
        input:focus {
            outline: none;
            border-color: #e63946;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="loader"></div>
        <p>جاري التحميل...</p>
    </div>

    <!-- Sound Effect -->
    <audio id="clickSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Content -->
    <div class="container" id="mainContent">
        <h1 id="title">Marrakech RP</h1>
        
        <button class="btn" onclick="playSound(); showLogin()">تسجيل الدخول</button>
        
        <a href="https://chat.whatsapp.com/Gv8hm9WDcRVGA9GoMVDya3?mode=gi_t" class="btn" onclick="playSound()" target="_blank">
            مجموعة السيرفر
        </a>

        <div class="btn-group">
            <div class="btn-label">DEV_MOSTAFA</div>
            <a href="https://wa.me/212775002021?text=مرحبا%20صديقي%20%22MOSTAFA%22%20لقد%20جئت%20من%20موقعكم" 
               class="btn" onclick="playSound()" target="_blank">
                775-002021
            </a>
        </div>

        <div class="btn-group">
            <div class="btn-label">SPIDERS_X17</div>
            <a href="https://wa.me/212645987253?text=مرحبا%20صديقي%20%22Spiders%22%20لقد%20جئت%20من%20موقعكم" 
               class="btn" onclick="playSound()" target="_blank">
                645-987253
            </a>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button class="btn" onclick="playSound(); login()">دخول</button>
        </div>
    </div>

    <script>
        // Loading Screen
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                }, 500);
            }, 1500);
        };

        // Animated Title
        const title = document.getElementById('title');
        let isFirst = true;
        setInterval(() => {
            title.style.opacity = '0';
            setTimeout(() => {
                title.textContent = isFirst ? 'Welcome To Marrakech' : 'Marrakech RP';
                title.style.opacity = '1';
                isFirst = !isFirst;
            }, 300);
        }, 3000);

        // Sound Effect
        function playSound() {
            document.getElementById('clickSound').play();
        }

        // Show Login
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
        }

        // Login Function
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user && pass) {
                alert('مرحبا ' + user + ' ! تم تسجيل الدخول بنجاح');
                playSound();
            } else {
                alert('المرجو ملء جميع الخانات');
            }
        }
    </script>
</body>
</html>
