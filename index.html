<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Marrakech RP PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

/* GTA LOADING SCREEN */
#loading {
  position:fixed;
  width:100%;
  height:100%;
  background: url('https://wallpapercave.com/wp/wp2757874.jpg') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loading-box {
  background:rgba(0,0,0,0.7);
  padding:20px;
  border:1px solid #00aaff;
  border-radius:10px;
}

.bar {
  width:200px;
  height:10px;
  border:1px solid #00aaff;
  margin-top:10px;
}

.progress {
  height:100%;
  width:0%;
  background:#00aaff;
  animation:load 3s forwards;
}

@keyframes load {
  0%{width:0%}
  100%{width:100%}
}

/* MAIN */
#app {
  display:none;
  padding:20px;
}

h1 {
  color:#00aaff;
}

/* LOGIN */
input {
  padding:10px;
  margin:5px;
  width:200px;
}

button {
  padding:10px;
  background:#00aaff;
  border:none;
  cursor:pointer;
}

/* LEADERBOARD */
.table {
  width:300px;
  margin:20px auto;
  border:1px solid #00aaff;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-bottom:1px solid #222;
}

/* BUTTON */
.btn {
  display:block;
  width:200px;
  margin:10px auto;
  padding:10px;
  border:1px solid #00aaff;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<!-- GTA LOADING -->
<div id="loading">
  <div class="loading-box">
    <h2>GTA RP Loading</h2>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- APP -->
<div id="app">

<h1>Welcome To Marrakech RP</h1>

<div id="login">
  <input id="name" placeholder="Username">
  <input id="score" placeholder="Score (RP Level)">
  <br>
  <button onclick="login()">Login</button>
</div>

<h3 id="player"></h3>

<!-- LEADERBOARD -->
<h2>🏆 Leaderboard</h2>
<div class="table" id="board"></div>

<a class="btn" href="samp://127.0.0.1:7777">🚀 Enter Server</a>

</div>

<script>

/* loading */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
},3000);

/* LOGIN + SAVE */
function login(){
  let name=document.getElementById("name").value;
  let score=document.getElementById("score").value;

  if(!name) return;

  localStorage.setItem("player",name);
  localStorage.setItem("score",score||0);

  loadPlayer();
  updateBoard();
}

/* PLAYER */
function loadPlayer(){
  let name=localStorage.getItem("player");
  let score=localStorage.getItem("score");

  if(name){
    document.getElementById("player").innerText=
    "Player: "+name+" | Level: "+score;
  }
}

/* LEADERBOARD SYSTEM */
function updateBoard(){
  let players=[
    {n:"Mostafa",s:99},
    {n:"Spiders",s:95},
    {n:localStorage.getItem("player")||"Guest",s:localStorage.getItem("score")||0}
  ];

  players.sort((a,b)=>b.s-a.s);

  let html="";
  players.forEach(p=>{
    html+=`
      <div class="row">
        <span>${p.n}</span>
        <span>${p.s}</span>
      </div>
    `;
  });

  document.getElementById("board").innerHTML=html;
}

loadPlayer();
updateBoard();

</script>

</body>
</html>
