<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marrakech RP - SAMP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* فيديو الخلفية - مراكش و جامع الفنا */
        #bgVideo {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -3;
            object-fit: cover;
            opacity: 0.35;
            filter: blur(1px);
        }

        /* طبقة لونية فوق الفيديو */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(193,18,31,0.1) 0%, rgba(0,0,0,0.9) 70%);
            z-index: -2;
        }

        /* Loading */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 60px; height: 60px;
            border: 4px solid #111;
            border-top: 4px solid #c1121f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px #c1121f;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p { 
            margin-top: 20px; 
            color: #c1121f; 
            font-size: 18px;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* المحتوى الرئيسي */
        .container {
            display: none;
            background: rgba(10, 10, 10, 0.85);
            padding: 40px 25px;
            border-radius: 10px;
            border: 2px solid #c1121f;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(193, 18, 31, 0.4);
        }

        /* العنوان المتحرك */
        #title {
            font-size: 32px;
            font-weight: 900;
            color: #c1121f;
            margin-bottom: 30px;
            height: 40px;
            text-shadow: 0 0 20px rgba(193, 18, 31, 1), 0 0 40px rgba(193, 18, 31, 0.5);
            transition: opacity 0.4s;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
            margin-top: -15px;
        }

        /* الأزرار */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            background: #c1121f;
            border-color: #c1121f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(193, 18, 31, 0.6);
        }

        .btn-download {
            background: linear-gradient(145deg, #c1121f, #8b0000);
            border: 1px solid #ff1a1a;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(193, 18, 31, 0.5); }
            50% { box-shadow: 0 0 25px rgba(193, 18, 31, 1); }
        }

        .btn-group { margin: 18px 0; }

        .btn-label {
            font-size: 13px;
            color: #c1121f;
            margin-bottom: 5px;
            text-align: right;
            font-weight: bold;
        }

        .server-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- فيديو الخلفية مراكش -->
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="https://videos.pexels.com/video-files/854315/854315-hd_1920_1080_25fps.mp4" type="video/mp4">
    </video>

    <!-- صوت GTA V -->
    <audio id="bgSound" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?track=340525" type="audio/mpeg">
    </audio>

    <!-- Loading -->
    <div id="loading">
        <div class="loader"></div>
        <p>Marrakech RP Loading...</p>
    </div>

    <!-- المحتوى -->
    <div class="container" id="mainContent">
        <h1 id="title">Marrakech RP</h1>
        <div class="subtitle">SA:MP Mobile Server</div>
        
        <a href="#" class="btn btn-download" onclick="playClick()">
            📥 تحميل SA-MP Mobile
        </a>

        <a href="https://chat.whatsapp.com/Gv8hm9WDcRVGA9GoMVDya3?mode=gi_t" class="btn" onclick="playClick()" target="_blank">
            💬 مجموعة السيرفر
        </a>

        <div class="btn-group">
            <div class="btn-label">DEV_MOSTAFA - إدارة السيرفر</div>
            <a href="https://wa.me/212775002021?text=مرحبا%20صديقي%20%22MOSTAFA%22%20لقد%20جئت%20من%20موقعكم" 
               class="btn" onclick="playClick()" target="_blank">
                📞 775-002021
            </a>
        </div>

        <div class="btn-group">
            <div class="btn-label">SPIDERS_X17 - الدعم الفني</div>
            <a href="https://wa.me/212645987253?text=مرحبا%20صديقي%20%22Spiders%22%20لقد%20جئت%20من%20موقعكم" 
               class="btn" onclick="playClick()" target="_blank">
                📞 645-987253
            </a>
        </div>

        <div class="server-info">
            IP: قريباً | Players: 100/100 | Version: 0.3.7
        </div>
    </div>

    <script>
        // لودينغ 3 ثواني
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 3000);
        });

        // العنوان كيتبدل
        const title = document.getElementById('title');
        let isFirst = true;
        setInterval(() => {
            title.style.opacity = '0';
            setTimeout(() => {
                title.textContent = isFirst ? 'Welcome To Marrakech' : 'Marrakech RP';
                title.style.opacity = '1';
                isFirst = !isFirst;
            }, 400);
        }, 3500);

        // الصوت يخدم مع أول كليك
        document.body.addEventListener('click', () => {
            document.getElementById('bgSound').play();
        }, { once: true });

        function playClick() {
            document.getElementById('bgSound').play();
        }
    </script>
</body>
</html>
