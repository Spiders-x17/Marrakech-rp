<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Marrakech RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #050505, #0a0a0a, #111);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* glow background */
body::before {
  content: "";
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,170,255,0.08), transparent 60%);
  animation: moveGlow 8s linear infinite;
  z-index: 0;
}

@keyframes moveGlow {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.container {
  margin-top: 100px;
  position: relative;
  z-index: 1;
}

h1 {
  font-size: 45px;
  color: #00aaff;
  text-shadow: 0 0 10px #00aaff;
}

p {
  color: #aaa;
  margin-bottom: 30px;
}

.btn {
  display: block;
  width: 270px;
  margin: 12px auto;
  padding: 15px;
  text-decoration: none;
  color: white;
  border: 1px solid #00aaff;
  border-radius: 10px;
  background: rgba(0,170,255,0.05);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  background: #00aaff;
  color: black;
  box-shadow: 0 0 20px #00aaff;
  transform: scale(1.05);
}

.btn:active {
  transform: scale(0.95);
}

/* staff cards */
.card {
  width: 270px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #00aaff;
  background: rgba(0,170,255,0.05);
  box-shadow: 0 0 10px rgba(0,170,255,0.2);
}

footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">
  <h1>Marrakech RP</h1>
  <p>Official RP Server</p>

  <!-- WhatsApp links -->

    DEV_MOSTAFA
  </a>

  <a class="btn" href="https://wa.me/212645987253?text=%D9%85%D8%B1%D8%AD%D8%A8%D8%A7" target="_blank">
    SPIDERS_X17
  </a>

  <a class="btn" href="https://samp.com" target="_blank">
    Play SA-MP
  </a>


<footer>
  <div>SUBSCRIBE: Spidersyt</div>
  <div>SUBSCRIBE: mostafachargami</div>
</footer>

</body>
</html>
