<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marrakech RP - SAMP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* فيديو جامع الفنا فالخلفية */
        #bgVideo {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -3;
            object-fit: cover;
            opacity: 0.4;
        }

        /* طبقة غامقة + لون أحمر خفيف */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(193,18,31,0.15) 50%, rgba(0,0,0,0.9) 100%);
            z-index: -2;
        }

        /* Loading */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 60px; height: 60px;
            border: 4px solid #111;
            border-top: 4px solid #c1121f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px #c1121f;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p { 
            margin-top: 20px; 
            color: #c1121f; 
            font-size: 18px;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* المحتوى */
        .container {
            display: none;
            background: rgba(10, 10, 10, 0.88);
            padding: 40px 25px;
            border-radius: 10px;
            border: 2px solid #c1121f;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(193, 18, 31, 0.5);
        }

        #title {
            font-size: 32px;
            font-weight: 900;
            color: #c1121f;
            margin-bottom: 30px;
            height: 40px;
            text-shadow: 0 0 20px rgba(193, 18, 31, 1), 0 0 40px rgba(193, 18, 31, 0.6);
            transition: opacity 0.4s;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 25px;
            margin-top: -15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #c1121f;
            border-color: #c1121f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(193, 18, 31, 0.6);
        }

        .btn-download {
            background: linear-gradient(145deg, #c1121f, #8b0000);
            border: 1px solid #ff1a1a;
            animation: glow 2s infinite;
        }
