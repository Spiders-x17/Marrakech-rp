<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marrakech RP - SAMP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
            /* صورة جامع الفنا فالخلفية - خدامة 100% */
            background: url('https://images.unsplash.com/photo-1539650116574-75c0c6d73f6e?w=1920&q=80') center/cover no-repeat fixed;
        }

        /* طبقة غامقة فوق الصورة */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(193,18,31,0.2) 50%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            width: 60px; height: 60px;
            border: 4px solid #111;
            border-top: 4px solid #c1121f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px #c1121f;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p { 
            margin-top: 20px; 
            color: #c1121f; 
            font-size: 18px;
            letter-spacing: 2px;
        }

        .container {
            display: none;
            background: rgba(10, 10, 10, 0.9);
            padding: 40px 25px;
            border-radius: 10px;
            border: 2px solid #c1121f;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(193, 18, 31, 0.6);
        }
